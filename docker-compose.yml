services:
  postgres:
    image: postgres:17
    container_name: market-insight-db
    ports:
      - "5433:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Airflow 공통 설정을 x-airflow로 묶어서 재사용 (Java의 상속 개념)
  # <<: *airflow-common 으로 아래 서비스들이 이 설정을 복사해감
  x-airflow-common: &airflow-common
    image: apache/airflow:2.10.5-python3.12
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://market:market1234@postgres:5432/market_insight
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=market_insight
      - POSTGRES_USER=market
      - POSTGRES_PASSWORD=market1234
      - PYTHONPATH=/opt/airflow/src
      - _PIP_ADDITIONAL_REQUIREMENTS=requests beautifulsoup4 psycopg2-binary python-dotenv
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - postgres

  airflow-init:
    <<: *airflow-common
    container_name: market-insight-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: market-insight-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: market-insight-airflow-scheduler
    command: airflow scheduler
    depends_on:
      - airflow-init
    restart: always

volumes:
  postgres_data:
  airflow_logs: